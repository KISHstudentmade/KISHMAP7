<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>하노이한국국제학교 KISH 안내도</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bot-h:calc(56px + env(safe-area-inset-bottom,0px))}
body{font-family:"Pretendard","Noto Sans KR",sans-serif;background:#f5f7fa;color:#1a2332;height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--bot-h)}

.hdr{padding:8px 14px 6px;background:#fff;border-bottom:1px solid #e5e9ef;flex-shrink:0;z-index:10;display:flex;align-items:center;gap:9px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hdr-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.hdr h1{font-size:13px;font-weight:800;color:#1a2332;letter-spacing:-.4px;line-height:1.3}
.hdr h1 .sub{font-size:9px;color:#94a3b8;font-weight:500;margin-left:3px}
.hdr p{font-size:10px;color:#94a3b8;margin-top:1px}

.panel{background:#fff;border-bottom:1px solid #e5e9ef;display:none;flex-shrink:0;overflow:hidden}
.panel.show{display:block}
.panel-inner{padding:10px 14px;max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.panel-inner > .p-inp:first-of-type{padding-right:40px}
.panel-inner > .prow:first-of-type .p-inp{padding-right:60px}
.panel-x{position:absolute;top:6px;right:8px;width:26px;height:26px;border-radius:50%;background:#f0f3f8;color:#3a4a5e;border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:10;font-family:inherit;transition:background .15s}
.panel-x:active{background:#dde3ed}
.p-inp{width:100%;padding:10px 13px;background:#f5f7fa;border:1.5px solid #e5e9ef;border-radius:10px;color:#1a2332;font-size:14px;outline:none;font-family:inherit;transition:border .15s;margin-bottom:8px}
.p-inp:focus{border-color:#0066ff;background:#fff}
.prow{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.parrow{font-size:15px;flex-shrink:0;margin-top:11px}
.prow-inp{flex:1;position:relative}
.prow-inp .p-inp{margin-bottom:0}
.clr-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:#94a3b8;color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:5;transition:background .15s}
.clr-x:active{background:#64748b}
.gps-fp{margin:-4px 0 8px 22px;padding:8px 10px;background:#f0f7ff;border:1px solid #c7e0ff;border-radius:10px;flex-direction:column;gap:6px}
.gps-fp-row{display:flex;gap:6px}
.gps-fp-bldg{flex:1;padding:6px 8px;background:#fff;border:1.5px solid #c7e0ff;border-radius:8px;color:#0066ff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.gps-fp-bldg.on{background:#0066ff;border-color:#0066ff;color:#fff}
.gps-fp-floors{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.gps-fp-floors::-webkit-scrollbar{display:none}
.gps-fp-floor{flex:0 0 auto;padding:5px 12px;background:#fff;border:1.5px solid #c7e0ff;border-radius:14px;color:#0066ff;font-weight:600;font-size:11px;white-space:nowrap;cursor:pointer;font-family:inherit;transition:all .15s}
.gps-fp-floor.on{background:#1a2332;border-color:#1a2332;color:#fff}
.route-btn{width:100%;padding:11px;background:#0066ff;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:2px}
.route-btn:active{background:#0055d4}

.sug{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid #e5e9ef;border-radius:10px;max-height:160px;overflow-y:auto;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.sug.open{display:block}
.sug-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid #f0f3f8;font-size:13px}
.sug-item:last-child{border-bottom:none}
.sug-item:active,.sug-item:hover{background:#f0f7ff}
.sug-name{font-weight:600;color:#1a2332}
.sug-loc{font-size:11px;color:#6b7888;margin-top:1px}

.sr-wrap{border:1px solid #e5e9ef;border-radius:10px;overflow:hidden;display:none;margin-top:6px}
.sr-wrap.open{display:block}
.sr-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f3f8;display:flex;align-items:center;gap:9px;font-size:13px}
.sr-item:last-child{border-bottom:none}
.sr-item:active,.sr-item:hover{background:#f0f3f8}
.sr-ico{font-size:16px;flex-shrink:0}
.sr-name{font-weight:600;color:#1a2332}
.sr-loc{font-size:11px;color:#6b7888;margin-top:1px}
.no-res{font-size:13px;color:#6b7888;text-align:center;padding:10px;display:none}

.bldg-tabs{display:flex;padding:10px 14px 0;gap:8px;flex-shrink:0;background:#f5f7fa}
.bldg-tab{flex:1;padding:9px 6px;background:#fff;border:1.5px solid #e5e9ef;border-radius:12px;color:#6b7888;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.bldg-tab.active{background:#0066ff;border-color:#0066ff;color:#fff;box-shadow:0 3px 10px rgba(0,102,255,.25)}
.floor-tabs{display:flex;padding:8px 14px;gap:5px;overflow-x:auto;flex-shrink:0;background:#f5f7fa;scrollbar-width:none}
.floor-tabs::-webkit-scrollbar{display:none}
.floor-tab{padding:6px 14px;background:#fff;border:1.5px solid #e5e9ef;border-radius:20px;color:#6b7888;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .15s}
.floor-tab.active{background:#1a2332;border-color:#1a2332;color:#fff}
.floor-tab.hr{background:#fef3c7;border-color:#f59e0b;color:#92400e}

.map-wrap{flex:1;position:relative;overflow:hidden;margin:0 8px;border-radius:14px 14px 0 0;background:#fff;border:1px solid #e5e9ef;border-bottom:none;cursor:grab}
.map-wrap.dragging{cursor:grabbing}
.map-stage{position:absolute;transform-origin:0 0;will-change:transform}
.map-img{display:block;pointer-events:none;user-select:none;-webkit-user-drag:none}
.floor-lbl{position:absolute;top:11px;left:11px;background:#fff;border-radius:9px;padding:6px 12px;font-size:11px;font-weight:700;color:#1a2332;border:1px solid #e5e9ef;z-index:5;box-shadow:0 2px 5px rgba(0,0,0,.05);pointer-events:none}
.zoom-hint{position:absolute;top:11px;right:11px;background:#fff;border-radius:9px;padding:5px 10px;font-size:10px;color:#94a3b8;font-weight:600;border:1px solid #e5e9ef;z-index:5;pointer-events:none}
.zoom-btns{position:absolute;bottom:14px;right:12px;display:flex;flex-direction:column;gap:5px;z-index:5}
.zbtn{width:36px;height:36px;border-radius:9px;background:#fff;border:1px solid #e5e9ef;color:#1a2332;font-size:17px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.06)}
.zbtn:active{background:#f0f3f8}

.gps-dot{position:absolute;width:24px;height:24px;border-radius:50%;background:rgba(0,102,255,.25);border:1.5px solid rgba(0,102,255,.45);z-index:8;transform:translate(-50%,-50%);pointer-events:none;display:none;box-shadow:0 0 0 5px rgba(0,102,255,.08)}
.gps-dot.on{display:block;animation:gp 2.6s ease-in-out infinite}
.gps-ring{position:absolute;border-radius:50%;background:rgba(0,102,255,.05);border:1.5px dashed rgba(0,102,255,.32);z-index:6;transform:translate(-50%,-50%);pointer-events:none;display:none;box-sizing:border-box}
.gps-ring.on{display:block}
@keyframes gp{0%,100%{opacity:1}50%{opacity:.6}}
.gps-cone{position:absolute;width:90px;height:90px;pointer-events:none;z-index:7;transform-origin:50% 50%;display:none;transition:transform .25s ease-out}
.gps-cone.on{display:block}
.gps-cone svg{width:100%;height:100%;display:block;position:absolute;left:0;top:0}

.rhit{position:absolute;cursor:pointer;border-radius:4px;border:2px solid transparent;background:transparent;transition:background .1s,border-color .1s}
.rhit.tc:hover{background:rgba(59,130,246,.22);border-color:rgba(59,130,246,.65)}
.rhit.to:hover{background:rgba(245,158,11,.22);border-color:rgba(245,158,11,.65)}
.rhit.ts:hover{background:rgba(168,85,247,.22);border-color:rgba(168,85,247,.65)}
.rhit.tf:hover{background:rgba(16,185,129,.22);border-color:rgba(16,185,129,.65)}
.rhit.tg:hover{background:rgba(239,68,68,.22);border-color:rgba(239,68,68,.65)}
.rhit.tu:hover{background:rgba(148,163,184,.22);border-color:rgba(148,163,184,.65)}
.rhit.tc.sel{background:rgba(59,130,246,.35);border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
.rhit.to.sel{background:rgba(245,158,11,.35);border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.rhit.ts.sel{background:rgba(168,85,247,.35);border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.2)}
.rhit.tf.sel{background:rgba(16,185,129,.35);border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.rhit.tg.sel{background:rgba(239,68,68,.35);border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.2)}
.rhit.tu.sel{background:rgba(148,163,184,.35);border-color:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.2)}
.rhit.pins{background:rgba(16,185,129,.4)!important;border-color:#10b981!important;animation:pulse 1.5s infinite}
.rhit.pine{background:rgba(239,68,68,.4)!important;border-color:#ef4444!important;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.info-sheet{position:fixed;bottom:var(--bot-h);left:0;right:0;z-index:60;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);display:none}
.info-sheet.open{display:block;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.info-handle-row{padding:10px 14px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.info-hbar{width:36px;height:4px;background:#e5e9ef;border-radius:2px}
.info-xbtn{background:#f0f3f8;border:none;border-radius:8px;width:30px;height:30px;font-size:14px;color:#3a4a5e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.info-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.info-name{font-size:15px;font-weight:800;color:#1a2332;letter-spacing:-.3px}
.info-loc{font-size:11px;color:#6b7888;margin-top:2px}
.info-scroll{overflow-y:auto;max-height:42vh;padding:0 14px 16px;-webkit-overflow-scrolling:touch}
.info-desc-box{font-size:13px;color:#3a4a5e;padding:11px;background:#f5f7fa;border-radius:10px;line-height:1.5}
.tchip-sec{margin-top:10px;padding:11px;background:#f0f7ff;border-radius:10px;border:1px solid #c7e0ff}
.tchip-title{font-size:11px;font-weight:700;color:#0066ff;margin-bottom:7px}
.tchips{display:flex;flex-wrap:wrap;gap:5px}
.chip{background:#fff;border:1px solid #c7e0ff;color:#0066ff;padding:3px 9px;border-radius:11px;font-size:11px;font-weight:600}

.route-wrap{position:fixed;bottom:var(--bot-h);left:0;right:0;z-index:45;pointer-events:none;display:none}
.route-wrap.on{display:block}
.rtab{width:64px;height:28px;border-radius:28px 28px 0 0;background:#0066ff;margin:0 auto;display:flex;align-items:center;justify-content:center;pointer-events:all;cursor:pointer;box-shadow:0 -2px 8px rgba(0,102,255,.25)}
.rtab:active{background:#0055d4}
.rtab-arr{color:#fff;font-size:13px;font-weight:700;transition:transform .3s}
.rbox{background:#fff;box-shadow:0 -4px 20px rgba(0,0,0,.1);max-height:60vh;display:flex;flex-direction:column;pointer-events:all;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.rbox.closed{max-height:0}
.rtop{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 6px;flex-shrink:0}
.rtop-lbl{font-size:12px;font-weight:700;color:#6b7888}
.rx{background:#f0f3f8;border:none;border-radius:7px;width:28px;height:28px;font-size:13px;color:#3a4a5e;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.rscroll{overflow-y:auto;padding:0 14px 16px;-webkit-overflow-scrolling:touch}
.r-title-txt{font-size:13px;font-weight:700;color:#9a3412;margin-bottom:8px}
.rstep{display:flex;align-items:flex-start;gap:8px;padding:7px 0;font-size:13px;color:#3a4a5e;line-height:1.4;border-bottom:1px dashed #fed7aa}
.rstep:last-child{border-bottom:none}
.rstep-n{background:#f59e0b;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}

.botbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e9ef;z-index:40;padding-bottom:env(safe-area-inset-bottom,0)}
.bottrack{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bottrack::-webkit-scrollbar{display:none}
.tabbtn{flex:0 0 20%;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;border:none;background:transparent;cursor:pointer;color:#94a3b8;font-family:inherit;scroll-snap-align:start;transition:color .15s}
.tabbtn.active{color:#0066ff}
.tabbtn:active{background:#f8faff;border-radius:10px}
.tabico{font-size:19px;line-height:1}
.tablbl{font-size:10px;font-weight:600;margin-top:2px;white-space:nowrap}
.botdots{display:flex;justify-content:center;gap:3px;padding:2px 0}
.bdot{width:5px;height:3px;border-radius:2px;background:#e5e9ef;transition:all .2s}
.bdot.on{background:#0066ff;width:13px}

.cr-ov{position:fixed;inset:0;background:rgba(15,23,35,.6);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.cr-ov.on{display:flex}
.cr-box{background:#fff;border-radius:20px;padding:24px 20px 20px;max-width:320px;width:100%;text-align:center;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.cr-x{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;background:#f0f3f8;border:none;cursor:pointer;font-size:13px;color:#3a4a5e;font-weight:700;display:flex;align-items:center;justify-content:center}
.cr-icon{font-size:38px;margin-bottom:6px}
.cr-title{font-size:11px;color:#6b7888;font-weight:700;letter-spacing:.5px;margin-bottom:7px}
.cr-names{font-size:18px;font-weight:800;color:#1a2332;margin-bottom:14px}
.cr-proj{font-size:12px;color:#3a4a5e;font-weight:600;padding:10px;background:#f5f7fa;border-radius:10px;line-height:1.5}
.cr-div{height:1px;background:#e5e9ef;margin:14px 0 12px}
.survey-a{display:block;padding:11px;background:linear-gradient(135deg,#0066ff,#5a9eff);color:#fff;border-radius:10px;text-decoration:none;font-size:13px;font-weight:700;margin-bottom:12px}
.cr-contact{padding:10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px}
.cr-kakao{font-size:16px;font-weight:800;color:#f59e0b;font-family:monospace;margin-top:2px}

.lang-ind{position:fixed;bottom:calc(var(--bot-h) + 12px);left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;border-radius:14px;padding:4px 12px;font-size:11px;font-weight:700;z-index:30;opacity:0;transition:opacity .3s;pointer-events:none}
.lang-ind.on{opacity:1}
.route-line{animation:dashFlow 1s linear infinite}
@keyframes dashFlow{to{stroke-dashoffset:-24}}
</style>
</head>
<body>

<div class="hdr">
  <img class="hdr-logo" src="./image/logo.png" alt="KISH">  
<div>
    <h1>하노이한국국제학교 KISH 안내도<span class="sub">(학생 제작)</span></h1>
    <p id="hdr-desc">2026학년도 층별 배치도</p>
  </div>
</div>

<div class="panel" id="pSearch">
  <div class="panel-inner">
    <button class="panel-x" onclick="closePanel('search')" aria-label="닫기">✕</button>
    <input class="p-inp" type="text" id="searchInput" placeholder="교실 이름 또는 번호로 검색" oninput="doSearch(this.value)">
    <div class="sr-wrap" id="srWrap"></div>
    <div class="no-res" id="srNone">검색 결과가 없습니다</div>
  </div>
</div>

<div class="panel" id="pRoute">
  <div class="panel-inner">
    <button class="panel-x" onclick="closePanel('route')" aria-label="닫기">✕</button>
    <div class="prow"><span class="parrow" style="color:#10b981">●</span><div class="prow-inp"><input class="p-inp" type="text" id="startInput" placeholder="현재 위치"><button id="clearStartBtn" class="clr-x" onclick="clearGpsStart()" style="display:none">✕</button><div class="sug" id="sugS"></div></div></div>
    <div id="gpsFloorPicker" class="gps-fp" style="display:none"></div>
    <div class="prow"><span class="parrow" style="color:#ef4444">▼</span><div class="prow-inp"><input class="p-inp" type="text" id="endInput" placeholder="목적지"><div class="sug" id="sugE"></div></div></div>
    <button class="route-btn" id="routeBtn" onclick="findRoute()">길찾기</button>
  </div>
</div>

<div class="bldg-tabs" id="bldgTabs"></div>
<div class="floor-tabs" id="floorTabs"></div>

<div class="map-wrap" id="mapWrap">
  <div class="map-stage" id="mapStage">
    <img class="map-img" id="mapImg" alt="">
    <svg id="routeOverlay" class="route-overlay" width="1680" height="945" style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible"></svg>
    <div id="hitLayer"></div>
  </div>
  <div class="gps-cone" id="gpsCone"><svg viewBox="-50 -50 100 100"><defs><radialGradient id="cgrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(0,102,255,0.28)"/><stop offset="60%" stop-color="rgba(0,102,255,0.08)"/><stop offset="100%" stop-color="rgba(0,102,255,0)"/></radialGradient></defs><path d="M 0 0 L -38 -32 A 50 50 0 0 1 38 -32 Z" fill="url(#cgrad)"/></svg></div>
  <div class="gps-dot" id="gpsDot"></div>
  <div id="gpsStatus" style="position:absolute;top:50px;left:11px;background:#1a2332;color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;z-index:6;display:none;max-width:calc(100% - 80px);line-height:1.4"></div>
  <div class="gps-ring" id="gpsRing"></div>
  <div class="floor-lbl" id="floorLbl"></div>
  <div class="zoom-hint" id="zoomHint">두 손가락으로 확대/축소</div>
  <div class="zoom-btns">
    <button class="zbtn" onclick="zoomAt(1.3)">+</button>
    <button class="zbtn" onclick="resetView()" style="font-size:12px">↺</button>
    <button class="zbtn" onclick="zoomAt(1/1.3)">−</button>
  </div>
</div>

<!-- INFO SHEET (closed by default) -->
<div class="info-sheet" id="infoSheet">
  <div class="info-handle-row">
    <div style="flex:1"></div>
    <div class="info-hbar"></div>
    <div style="flex:1;display:flex;justify-content:flex-end"><button class="info-xbtn" onclick="closeInfo()">✕</button></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:0 14px 10px">
    <div class="info-icon" id="infoIcon"></div>
    <div><div class="info-name" id="infoName"></div><div class="info-loc" id="infoLoc"></div></div>
  </div>
  <div class="info-scroll" id="infoScroll"></div>
</div>

<!-- ROUTE SHEET -->
<div class="route-wrap" id="routeWrap">
  <div class="rtab" onclick="toggleRoute()"><span class="rtab-arr" id="rtabArr">▲</span></div>
  <div class="rbox closed" id="rbox">
    <div class="rtop"><span class="rtop-lbl" id="rtopLbl">경로 안내</span><button class="rx" onclick="clearRoute()">✕</button></div>
    <div class="rscroll" id="rscroll"></div>
  </div>
</div>

<div class="botbar">

function buildHits(fk){const layer=$("hitLayer");layer.innerHTML="";(ROOMS[fk]||[]).forEach(r=>{const d=document.createElement("div");const tm=TMAP[r.type]||TMAP.utility;let cls="rhit "+tm.cs;if(selId===r.id)cls+=" sel";if(rStart?.id===r.id)cls+=" pins";if(rEnd?.id===r.id)cls+=" pine";d.className=cls;d.style.cssText=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px`;d.dataset.id=r.id;d.addEventListener("click",e=>{e.stopPropagation();if(!mapMoved)selectRoom(r.id);});layer.appendChild(d);});}
function fitToScreen(){
  const w=$("mapWrap"),cw=w.clientWidth,ch=w.clientHeight;
  const rooms=ROOMS[fkey()]||[];
  if(rooms.length===0){
    fitSc=Math.min(cw/IMG_W,ch/IMG_H)*0.98;
    sc=fitSc;px=(cw-IMG_W*sc)/2;py=(ch-IMG_H*sc)/2;
  }else{
    // Fit to bounding box of rooms (with padding)
    let minX=IMG_W,minY=IMG_H,maxX=0,maxY=0;
    rooms.forEach(r=>{minX=Math.min(minX,r.x);minY=Math.min(minY,r.y);maxX=Math.max(maxX,r.x+r.w);maxY=Math.max(maxY,r.y+r.h);});
    const pad=80;
    minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
    maxX=Math.min(IMG_W,maxX+pad);maxY=Math.min(IMG_H,maxY+pad);
    const bw=maxX-minX,bh=maxY-minY;
    fitSc=Math.min(cw/bw,ch/bh)*0.97;
    sc=fitSc;
    // Center the bbox in the viewport
    px=(cw-bw*sc)/2-minX*sc;
    py=(ch-bh*sc)/2-minY*sc;
  }
  applyT();
}
function applyT(){$("mapStage").style.transform=`translate(${px}px,${py}px) scale(${sc})`;updateGpsDot();}
function zoomAt(f,cx,cy){const w=$("mapWrap");if(cx==null){cx=w.clientWidth/2;cy=w.clientHeight/2;}const ns=Math.min(fitSc*6,Math.max(fitSc*.8,sc*f));const r=ns/sc;px=cx-r*(cx-px);py=cy-r*(cy-py);sc=ns;applyT();}

function setupMap(){const wrap=$("mapWrap");
  wrap.addEventListener("mousedown",e=>{if(e.target.closest(".rhit,.zbtn"))return;mapDrag=true;mapMoved=false;mdpx=px;mdpy=py;mdx=e.clientX;mdy=e.clientY;wrap.classList.add("dragging");});

  window.addEventListener("mouseup",()=>{mapDrag=false;$("mapWrap").classList.remove("dragging");setTimeout(()=>mapMoved=false,100);});
  wrap.addEventListener("touchstart",e=>{if(e.touches.length===1&&!e.target.closest(".rhit,.zbtn")){mapDrag=true;mapMoved=false;const t=e.touches[0];mdpx=px;mdpy=py;mdx=t.clientX;mdy=t.clientY;}else if(e.touches.length===2){mapDrag=false;pinch=true;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;p0d=Math.hypot(dx,dy);p0sc=sc;const rect=wrap.getBoundingClientRect();p0cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;p0cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;}},{passive:true});
  wrap.addEventListener("touchmove",e=>{if(pinch&&e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const nd=Math.hypot(dx,dy),ns=Math.min(fitSc*6,Math.max(fitSc*.8,p0sc*(nd/p0d)));const r=ns/sc;px=p0cx-r*(p0cx-px);py=p0cy-r*(p0cy-py);sc=ns;applyT();}else if(mapDrag&&e.touches.length===1){const t=e.touches[0],dx=t.clientX-mdx,dy=t.clientY-mdy;if(Math.abs(dx)>5||Math.abs(dy)>5)mapMoved=true;px=mdpx+dx;py=mdpy+dy;applyT();}},{passive:false});
  wrap.addEventListener("touchend",e=>{if(e.touches.length<2)pinch=false;if(e.touches.length===0){mapDrag=false;setTimeout(()=>mapMoved=false,100);}},{passive:true});

  $("mapImg").addEventListener("load",fitToScreen);
}

function searchAll(q){if(!q?.trim())return[];const nq=norm(q),res=[];for(const[fk,rooms]of Object.entries(ROOMS)){const[b,f]=fk.split("_");rooms.forEach(r=>{const haystack=[rN(r),r.name,r.name_en||"",r.name_vi||"",...(r.aliases||[]),...(r.aliases_en||[]),...(r.aliases_vi||[])].join(" ").toLowerCase().replace(/\s/g,"");if(haystack.includes(nq))res.push({...r,b,f,fk});});}return res;}

let routeSegments={}; // {floorKey: [{from:{x,y}, to:{x,y}, type}]}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// Find best stair available on multiple floors of one building, minimizing total distance to given points
function findBestStair(building,floors,points){
  const cands=STAIRS[building].filter(s=>floors.every(f=>s.floors.includes(f)));
  if(!cands.length)return null;
  let best=null,bestCost=Infinity;
  cands.forEach(s=>{
    const cost=points.reduce((a,p)=>a+dist(s,p),0);
    if(cost<bestCost){bestCost=cost;best=s;}
  });
  return best;
}

function buildRouteSegments(start,end){
  routeSegments={};
  const sf=parseInt(start.f),ef=parseInt(end.f);
  const sFK=start.b+"_"+start.f,eFK=end.b+"_"+end.f;
  const sC={x:start.x+start.w/2,y:start.y+start.h/2};
  const eC={x:end.x+end.w/2,y:end.y+end.h/2};
  if(start.b===end.b){
    if(start.f===end.f){
      routeSegments[sFK]=[{from:sC,to:eC,type:"direct"}];
      return;
    }
    // Same building, different floor: pick stair best for both
    const st=findBestStair(start.b,[sf,ef],[sC,eC]);
    if(!st)return;
    routeSegments[sFK]=[{from:sC,to:st,type:"toStair"}];
    routeSegments[eFK]=[{from:st,to:eC,type:"fromStair"}];
    return;
  }
  // Cross-building
  const useGround=sf<=2&&ef<=2&&(sf===1||ef===1);
  if(useGround){
    // 1F outdoor route
    const sSt=findBestStair(start.b,[sf,1],[sC]);
    const eSt=findBestStair(end.b,[ef,1],[eC]);
    if(sf!==1&&sSt)routeSegments[sFK]=[{from:sC,to:sSt,type:"toStair"}];
    if(sf===1&&sSt)routeSegments[sFK]=[{from:sC,to:sSt,type:"toExit"}];
    if(ef===1&&eSt){
      if(!routeSegments[eFK])routeSegments[eFK]=[];
      routeSegments[eFK].push({from:eSt,to:eC,type:"fromEntrance"});
    }
    if(ef!==1&&eSt){
      if(!routeSegments[eFK])routeSegments[eFK]=[];
      routeSegments[eFK].push({from:eSt,to:eC,type:"fromStair"});
    }
  }else{
    // 3F ramp route
    const ramp_s=RAMPS[start.b],ramp_e=RAMPS[end.b];
    const sSt=findBestStair(start.b,[sf,3],[sC,ramp_s]);
    const eSt=findBestStair(end.b,[3,ef],[ramp_e,eC]);
    if(sf!==3&&sSt)routeSegments[sFK]=[{from:sC,to:sSt,type:"toStair"}];
    if(sf===3)routeSegments[sFK]=[{from:sC,to:ramp_s,type:"toRamp"}];
    // 3F segments
    const s3F=start.b+"_3층",e3F=end.b+"_3층";
    if(sf!==3&&sSt){
      if(!routeSegments[s3F])routeSegments[s3F]=[];
      routeSegments[s3F].push({from:sSt,to:ramp_s,type:"toRamp"});
    }
    if(ef!==3&&eSt){
      if(!routeSegments[e3F])routeSegments[e3F]=[];
      routeSegments[e3F].push({from:ramp_e,to:eSt,type:"fromRamp"});
    }
    if(ef===3)routeSegments[e3F]=[{from:ramp_e,to:eC,type:"fromRamp"}];
    if(ef!==3&&eSt){
      if(!routeSegments[eFK])routeSegments[eFK]=[];
      routeSegments[eFK].push({from:eSt,to:eC,type:"fromStair"});
    }
  }
}

function renderRouteOverlay(){
  // 빨간 점선 경로 비활성화 - 깔끔한 지도 유지
  const svg=$("routeOverlay");
  if(svg)svg.innerHTML="";
}

function findRoute(){if(gpsRouteRoom){const fresh=buildGpsStart();if(fresh)gpsRouteRoom=fresh;}const s = gpsRouteRoom || getRI($("startInput"));
const e = getRI($("endInput"));if(!s||!e){$("rscroll").innerHTML=`<div class="r-title-txt">⚠️ 출발지와 목적지를 모두 입력해주세요</div>`;openRoute();return;}rStart=s;rEnd=e;buildRouteSegments(s,e);const sf=parseInt(s.f),ef=parseInt(e.f);const sfi=BLDGS[s.b].floors.indexOf(s.f),efi=BLDGS[e.b].floors.indexOf(e.f);const L2=L();const steps=[];steps.push(L2.depart(bN(s.b),fN(s.b,sfi),s.name));if(s.b===e.b){if(s.f===e.f)steps.push(L2.sameFloor(e.name));else{steps.push(L2.stairs(fN(e.b,efi),ef>sf?L2.up:L2.dn,Math.abs(ef-sf)));steps.push(L2.corridor(e.name));}}else{const useGround=sf<=2&&ef<=2&&(sf===1||ef===1);const BK=bN("본관"),SK=bN("신관");if(s.b==="본관"){if(useGround){if(sf!==1)steps.push(L2.gnd1(BK,sf>1?L2.dn:L2.up));steps.push(L2.gndOut(BK,SK));if(ef!==1)steps.push(L2.gndUp(SK,fN("신관",efi),Math.abs(ef-1),ef>1?L2.up:L2.dn));}else{if(sf!==3)steps.push(L2.ramp3dn(BK,sf<3?L2.up:L2.dn));steps.push(L2.ramp(BK,SK));if(ef!==3)steps.push(L2.rampUp(SK,fN("신관",efi),Math.abs(ef-3),ef<3?L2.dn:L2.up));}}else{if(useGround){if(sf!==1)steps.push(L2.gnd1(SK,sf>1?L2.dn:L2.up));steps.push(L2.gndOut(SK,BK));if(ef!==1)steps.push(L2.gndUp(BK,fN("본관",efi),Math.abs(ef-1),ef>1?L2.up:L2.dn));}else{if(sf!==3)steps.push(L2.ramp3dn(SK,sf<3?L2.up:L2.dn));steps.push(L2.ramp(SK,BK));if(ef!==3)steps.push(L2.rampUp(BK,fN("본관",efi),Math.abs(ef-3),ef<3?L2.dn:L2.up));}}steps.push(L2.corridor(e.name));}steps.push(L2.arrive(e.name));let html=`<div class="r-title-txt">🧭 ${s.name} → ${e.name}</div>`;steps.forEach((st,i)=>html+=`<div class="rstep"><div class="rstep-n">${i+1}</div><div>${st}</div></div>`);$("rscroll").innerHTML=html;closePanel("route");openRoute();buildFloorTabs();bldg=s.b;floor=s.f;buildBldgTabs();buildFloorTabs();renderMap();setTimeout(()=>{const w=$("mapWrap");sc=fitSc*1.8;px=w.clientWidth/2-(s.x+s.w/2)*sc;py=w.clientHeight/2-(s.y+s.h/2)*sc-30;applyT();},200);}
function clearRoute(){rStart=null;rEnd=null;routeSegments={};gpsRouteRoom=null;["startInput","endInput"].forEach(id=>{const e=$(id);e.value="";e.readOnly=false;e.style.background="";e.style.fontWeight="";e.style.color="";for(const k of["rid","fk","b","f","x","y","w","h","rn"])delete e.dataset[k];});const xb=$("clearStartBtn");if(xb)xb.style.display="none";const fp=$("gpsFloorPicker");if(fp)fp.style.display="none";$("rscroll").innerHTML="";$("routeWrap").classList.remove("on");routeOpen=false;buildFloorTabs();renderMap();}
function openRoute(){$("routeWrap").classList.add("on");$("rbox").classList.remove("closed");$("rtabArr").style.transform="rotate(180deg)";routeOpen=true;}
function toggleRoute(){if(routeOpen){$("rbox").classList.add("closed");$("rtabArr").style.transform="";routeOpen=false;}else{$("rbox").classList.remove("closed");$("rtabArr").style.transform="rotate(180deg)";routeOpen=true;}}

const PIDS={search:"pSearch",route:"pRoute"};
const TBIDS={search:"tbS",route:"tbR"};
function togglePanel(w){const isOpen=$(PIDS[w]).classList.contains("show");for(const k in PIDS){$(PIDS[k]).classList.remove("show");$(TBIDS[k]).classList.remove("active");}if(!isOpen){$(PIDS[w]).classList.add("show");$(TBIDS[w]).classList.add("active");setTimeout(()=>$({search:"searchInput",route:"startInput"}[w])?.focus(),50);}}
function closePanel(w){$(PIDS[w]).classList.remove("show");$(TBIDS[w]).classList.remove("active");}

function showCredit(){$("crOv").classList.add("on");}
function hideCredit(){$("crOv").classList.remove("on");}
function hideCrOut(e){if(e.target===$("crOv"))hideCredit();}

function syncDots(){const tr=$("bottrack");if(!tr)return;const pct=tr.scrollWidth>tr.clientWidth?tr.scrollLeft/(tr.scrollWidth-tr.clientWidth):0;const dots=document.querySelectorAll(".bdot");const a=Math.round(pct*(dots.length-1));dots.forEach((d,i)=>d.classList.toggle("on",i===a));}

let lastLat=null,lastLng=null,lastAcc=null;
function showGpsMsg(msg,isErr){
  const el=$("gpsStatus");el.style.display="block";
  el.textContent=msg;
  el.style.background=isErr?"#dc2626":"#1a2332";
}
// Compute "where is north" angle in image (clockwise from image-up)
function northAngle(CX,CY){return Math.atan2(CX[0],-CY[0])*180/Math.PI;}
// 건물별 방향 콘 수동 보정 (시계방향 °). 도면이 정북과 살짝 어긋난 만큼 조정.
const HEADING_OFFSET={본관:-15, 신관:-15};
let lastHeading=null;
let gotAbsolute=false;  // absolute 이벤트가 한 번이라도 들어왔는지
let smoothHeading=null; // 저역통과 필터링된 값

function startOrient(){
  if(typeof DeviceOrientationEvent==="undefined")return;
  if(typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==="granted")attachOri();}).catch(()=>{});
  }else{attachOri();}
}
function attachOri(){
  window.addEventListener("deviceorientationabsolute",onOriAbs,true);
  window.addEventListener("deviceorientation",onOriRel,true);
}

// 각도 평활화 (저역통과 + wrap-around 처리)
function smoothAngle(prev, next, alpha){
  if(prev===null) return next;
  // -180~180 차이 계산해서 짧은 방향으로
  let diff = ((next-prev+540)%360)-180;
  return (prev + diff*alpha + 360)%360;
}

function applyHeading(h){
  if(h===null||isNaN(h))return;
  smoothHeading = smoothAngle(smoothHeading, h, 0.25); // 0.25 = 부드러움 (높을수록 즉각, 낮을수록 부드러움)
  lastHeading = smoothHeading;
  updateGpsDot();
}

// 절대 방향(진북 기준) 이벤트 - Android의 deviceorientationabsolute
function onOriAbs(e){
  if(e.alpha===null||e.alpha===undefined)return;
  gotAbsolute = true;
  applyHeading((360-e.alpha)%360);
}

// 일반 방향 이벤트 - iOS는 여기에 webkitCompassHeading 들어옴
// Android는 alpha가 절대 기준이 아닐 수 있어서 absolute 못 받을 때만 폴백으로 사용
function onOriRel(e){
  if(e.webkitCompassHeading!==undefined&&e.webkitCompassHeading!==null){
    // iOS - 항상 진북 기준
    gotAbsolute = true;
    applyHeading(e.webkitCompassHeading);
    return;
  }
  // Android에서 absolute를 한 번이라도 받았으면 일반 이벤트는 무시 (값이 막 섞임)
  if(gotAbsolute)return;
  if(e.alpha===null||e.alpha===undefined)return;
  applyHeading((360-e.alpha)%360);
}

function stopOrient(){
  window.removeEventListener("deviceorientationabsolute",onOriAbs,true);
  window.removeEventListener("deviceorientation",onOriRel,true);
  lastHeading=null;
  smoothHeading=null;
  gotAbsolute=false;
}
function hideGpsMsg(){$("gpsStatus").style.display="none";}

function toggleGps(){if(gpsOn)stopGps();else startGps();}

function startGps(){
  if(!navigator.geolocation){
    showGpsMsg(t("gpsNoSup"),true);
    return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.protocol!=='file:'){
    showGpsMsg(t("gpsNoHttps"),true);
    return;
  }
  showGpsMsg(t("gpsChecking"));
  gpsWatch=navigator.geolocation.watchPosition(onGpsOk,onGpsErr,{
    enableHighAccuracy:true,maximumAge:3000,timeout:20000
  });
  gpsOn=true;
  $("tbG").style.color="#0066ff";
  startOrient();
}

function stopGps(){
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch=null;gpsOn=false;
  $("tbG").style.color="";
  $("gpsDot").classList.remove("on");
  $("gpsRing").classList.remove("on");
  $("gpsCone").classList.remove("on");
  lastLat=null;lastLng=null;
  stopOrient();
  hideGpsMsg();
  gpsAutoStartDone = false;
  if(gpsRouteRoom){clearGpsStart();}
}

function onGpsErr(err){
  let msg="❌ GPS";
  if(err.code===1) msg=t("gpsDenied");
  else if(err.code===2) msg=t("gpsUnavail");
  else if(err.code===3) msg=t("gpsTimeout");
  showGpsMsg(msg,true);
}

function onGpsOk(pos){
  const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
  const inSchool=(lat>=BOUNDS.minLat&&lat<=BOUNDS.maxLat&&lng>=BOUNDS.minLng&&lng<=BOUNDS.maxLng);
  if(!inSchool){
    stopGps();
    showGpsMsg(t("gpsOut")+"\n"+t("gpsOutSub"),true);
    setTimeout(hideGpsMsg,4000);
    return;
  }
  showGpsMsg(t("gpsTrack")+" · "+t("gpsAcc")+" ±"+Math.round(acc)+"m");
  lastLat=lat;lastLng=lng;lastAcc=acc;
  updateGpsDot();
  // GPS 첫 수신 시 출발지가 비어있으면 자동으로 "현재 위치" 설정 (1회만)
  if(!gpsAutoStartDone){
    const inp = $("startInput");
    if(inp && !inp.value.trim()){
      useGpsAsStart();
    }
    gpsAutoStartDone = true;
  }
}

// Image pixels per meter: derived from affine transform magnitude
function imgPxPerMeter(building){
  const cx=building==="본관"?BK_CX:SK_CX;
  const cy=building==="본관"?BK_CY:SK_CY;
  // Magnitude of lat-vector and lng-vector in image space
  const latMag=Math.hypot(cx[0],cy[0])/111000;       // px per meter (lat direction)
  const lngMag=Math.hypot(cx[1],cy[1])/(111000*Math.cos(21.04*Math.PI/180)); // px per meter (lng direction)
  return (latMag+lngMag)/2;
}
function updateGpsDot(){
  const dot=$("gpsDot"),ring=$("gpsRing"),cone=$("gpsCone");
  if(!gpsOn||lastLat===null||lastLng===null){
    if(dot)dot.classList.remove("on");
    if(ring)ring.classList.remove("on");
    if(cone)cone.classList.remove("on");
    return;
  }
  const cx=bldg==="본관"?BK_CX:SK_CX;
  const cy=bldg==="본관"?BK_CY:SK_CY;
  const ix=cx[0]*lastLat+cx[1]*lastLng+cx[2];
  const iy=cy[0]*lastLat+cy[1]*lastLng+cy[2];
  const sx=ix*sc+px,sy=iy*sc+py;
  dot.style.left=sx+"px";dot.style.top=sy+"px";
  dot.classList.add("on");
  // Accuracy ring — properly sized using meters-to-pixel ratio
  if(lastAcc){
    const ppm=imgPxPerMeter(bldg);
    const r=Math.max(20,lastAcc*ppm*sc);  // r is RADIUS in screen pixels
    ring.style.left=sx+"px";ring.style.top=sy+"px";
    ring.style.width=(r*2)+"px";ring.style.height=(r*2)+"px";
    ring.classList.add("on");
  }
  // Direction cone (always position, only show when heading known)
  if(cone){
    cone.style.left=sx+"px";cone.style.top=sy+"px";
    if(lastHeading!==null){
      const nAngle=northAngle(cx,cy);
      const rot=nAngle+lastHeading+(HEADING_OFFSET[bldg]||0);
      cone.style.transform=`translate(-50%,-50%) rotate(${rot}deg)`;
      cone.classList.add("on");
    } else {
      cone.classList.remove("on");
    }
  }
}

document.addEventListener("DOMContentLoaded",init);

// GPS 위도/경도를 선택한 건물의 이미지 좌표로 변환
function gpsToImgCoord(building){
  if(lastLat===null||lastLng===null)return null;
  const cx = building==="본관"?BK_CX:SK_CX;
  const cy = building==="본관"?BK_CY:SK_CY;
  return {
    x: cx[0]*lastLat + cx[1]*lastLng + cx[2],
    y: cy[0]*lastLat + cy[1]*lastLng + cy[2]
  };
}

// 선택된 건물/층 기준으로 GPS 출발점 객체 만들기
function buildGpsStart(){
  const p = gpsToImgCoord(gpsStartBldg);
  if(!p)return null;
  return {
    id: "__gps__",
    name: "📍 "+t("stPh"),
    b: gpsStartBldg,
    f: gpsStartFloor,
    fk: gpsStartBldg+"_"+gpsStartFloor,
    x: p.x - 30,  // findRoute가 x+w/2를 중심으로 보므로 w=60 가정
    y: p.y - 30,
    w: 60,
    h: 60,
    type: "facility"
  };
}

// "현재 위치"를 출발지로 설정 (좌표 그대로, 층은 사용자 선택)
function useGpsAsStart(){
  if(lastLat===null||lastLng===null){
    showGpsMsg("GPS 위치를 가져오는 중...");
    return;
  }
  // 사용자가 아직 선택 안 했으면 현재 보고 있는 건물/층을 기본값으로
  if(!gpsRouteRoom){
    gpsStartBldg = bldg;
    gpsStartFloor = floor;
  }
  gpsRouteRoom = buildGpsStart();
  const inp = $("startInput");
  inp.value = "📍 "+t("stPh");
  inp.readOnly = true;
  inp.style.background = "#e0f2fe";
  inp.style.fontWeight = "600";
  inp.style.color = "#0066ff";
  $("sugS").classList.remove("open");
  const x = $("clearStartBtn");
  if(x) x.style.display = "flex";
  // 층 선택 UI 표시 + 현재 선택값 반영
  const fp = $("gpsFloorPicker");
  if(fp){
    fp.style.display = "flex";
    renderGpsFloorPicker();
  }
}

// 층 선택 UI 그리기 (본관/신관 토글 + 층 칩들)
function renderGpsFloorPicker(){
  const wrap = $("gpsFloorPicker");
  if(!wrap)return;
  let html = `<div class="gps-fp-row">`;
  // 건물 토글
  ["본관","신관"].forEach(b=>{
    html += `<button class="gps-fp-bldg ${b===gpsStartBldg?'on':''}" onclick="setGpsStartBldg('${b}')">${bN(b)}</button>`;
  });
  html += `</div><div class="gps-fp-floors" id="gpsFpFloors">`;
  // 층 칩들 - 가로 스크롤
  BLDGS[gpsStartBldg].floors.forEach((f,i)=>{
    html += `<button class="gps-fp-floor ${f===gpsStartFloor?'on':''}" onclick="setGpsStartFloor('${f}')">${fN(gpsStartBldg,i)}</button>`;
  });
  html += `</div>`;
  wrap.innerHTML = html;
}

function setGpsStartBldg(b){
  gpsStartBldg = b;
  // 새 건물에 해당 층이 없으면 1층으로
  if(!BLDGS[b].floors.includes(gpsStartFloor)) gpsStartFloor = BLDGS[b].floors[0];
  if(gpsRouteRoom) gpsRouteRoom = buildGpsStart();
  renderGpsFloorPicker();
}

function setGpsStartFloor(f){
  gpsStartFloor = f;
  if(gpsRouteRoom) gpsRouteRoom = buildGpsStart();
  renderGpsFloorPicker();
}

// X 버튼: "현재 위치" 해제하고 직접 입력 모드로
function clearGpsStart(){
  gpsRouteRoom = null;
  const inp = $("startInput");
  inp.value = "";
  inp.readOnly = false;
  inp.style.background = "";
  inp.style.fontWeight = "";
  inp.style.color = "";
  for(const k of["rid","fk","b","f","x","y","w","h","rn"])delete inp.dataset[k];
  const x = $("clearStartBtn");
  if(x) x.style.display = "none";
  const fp = $("gpsFloorPicker");
  if(fp) fp.style.display = "none";
  inp.focus();
}
